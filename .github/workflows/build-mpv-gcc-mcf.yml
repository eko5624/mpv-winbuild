  package:
    needs: [mpv]
    runs-on: ubuntu-latest
    env:
      BIT: ${{ inputs.build_target }}
      GH_TOKEN: ${{ secrets.BOT }}
    container:
      image: docker://ghcr.io/eko5624/archlinux:latest
    steps:    
      - name: Checkout
        uses: actions/checkout@main
      - name: Setting top_dir env
        run: echo "top_dir=$(cd ~ && pwd)" >> $GITHUB_ENV
      - name: Setup Packages      
        run: |
          curl -OL https://github.com/${{ github.repository }}/releases/download/latest-gcc-mcf-$BIT/config-1.0-1-x86_64.pkg.tar.xz        
          curl -OL https://github.com/${{ github.repository }}/releases/download/latest-gcc-mcf-$BIT/ffmpeg-shared-6.1.1-1-x86_64.pkg.tar.xz
          curl -OL https://github.com/${{ github.repository }}/releases/download/latest-gcc-mcf-$BIT/luajit2-shared-2.1_20231117-1-x86_64.pkg.tar.xz
          curl -OL https://github.com/${{ github.repository }}/releases/download/latest-gcc-mcf-$BIT/mpv-shared-0.37.0-1-x86_64.pkg.tar.xz
          pacman -U *.xz --noconfirm
      - name: Get current timestamp
        run: |
          echo "date=$(date +%Y%m%d)" >> $GITHUB_ENV
      - name: Zip Packages    
        run: |
          curl -OL https://github.com/yt-dlp/yt-dlp/releases/latest/download/yt-dlp.exe
          mv ${{ env.top_dir }}/opt/mpv/* ${{ env.top_dir }}/opt/bin
          mv yt-dlp.exe ${{ env.top_dir }}/opt/bin
          7z a shared-mpv-$BIT-gcc.7z ${{ env.top_dir }}/opt/bin/*
      - name: Release
        run: ./release-package.sh
          
