          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/lcms2-dev-2.16-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libaribcaption-dev-1.1.1-1-x86_64.pkg.tar.zst                
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libbs2b-dev-3.1.0-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libdovi-dev-3.2.0-1-x86_64.pkg.tar.zst
