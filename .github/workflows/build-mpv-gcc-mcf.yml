          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/vapoursynth-dev-65-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/vulkan-shared-dev-1.3.268.0-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/xxhash-dev-0.8.2-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/zlib-dev-2.1.5-1-x86_64.pkg.tar.zst
          pacman -U *.zst --noconfirm
          sudo chmod 777 -R ${{ env.top_dir }} .
          cd ffmpeg; sudo -H -u builder makepkg-cross -sLf
      - name: Release
        run: |
          ./release-latest.sh ffmpeg-shared ffmpeg
          ./release-dev.sh ffmpeg-shared-dev ffmpeg             

  libplacebo:
    needs: [vulkan]
    runs-on: ubuntu-latest
    env:
      BIT: ${{ inputs.build_target }}
      GH_TOKEN: ${{ secrets.BOT }}
    container:
      image: docker://ghcr.io/eko5624/archlinux:latest
    steps:    
      - name: Checkout
        uses: actions/checkout@main
      - name: Add builder user
        run: |
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          sudo cp pacman-config/makepkg_cross.conf /etc
          sudo cp pacman-config/makepkg-cross /usr/bin
      - name: Setting top_dir env
        run: echo "top_dir=$(cd ~ && pwd)" >> $GITHUB_ENV
      - name: Loading gcc-mcf-${{ inputs.build_target }} cache
