name: Build mpv
defaults:
  run:
    shell: bash
on:
  workflow_dispatch:
    inputs:
      build_target:
        description: "Build target"
        required: false
        default: "x86_64"
        type: choice
        options:
        - x86_64
        - x86_64_v3

  #schedule:
  #- cron: '30 0 * * MON'
    
jobs:
  mpv:
    runs-on: ubuntu-latest
    env:
      BIT: ${{ inputs.build_target }}
      GH_TOKEN: ${{ secrets.BOT }}
    container:
      image: docker://ghcr.io/eko5624/archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
        with:
          ref: gcc-mcf
      - name: Add builder user
        run: |
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          sudo cp pacman-config/makepkg_cross.conf /etc
          sudo cp pacman-config/makepkg-cross /usr/bin
      - name: Setting top_dir env
        run: |
          echo "top_dir=$(cd ~ && pwd)" >> $GITHUB_ENV
      - name: Loading gcc-mcf-${{ inputs.build_target }} cache
        uses: actions/cache@main
        with:
          path: ${{ env.top_dir }}/cross
          key: gcc-mcf-${{ inputs.build_target }}-ucrt
      - name: Build
        run: |
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/amf-headers-dev-1.4.33-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/angle-headers-dev-1.0.772-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/aom-dev-3.8.1-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/avisynth-dev-3.7.3-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/brotli-dev-1.1.0-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/dav1d-dev-1.4.0-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/davs2-dev-1.7-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/ffmpeg-dev-6.1.1-1-x86_64.pkg.tar.zst        
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/ffnvcodec-dev-12.1.14.0-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/freetype2-dev-2_13_2-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/fribidi-dev-1.0.13-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/highway-dev-1.1.0-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/harfbuzz-dev-8.3.0-1-x86_64.pkg.tar.zst      
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/lame-dev-3.100-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/lcms2-dev-2.16-1-x86_64.pkg.tar.zst
