          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libcaca-dev-0.99.beta20-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libdovi-dev-3.2.0-1-x86_64.pkg.tar.zst
