          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libmodplug-dev-0.8.9.0-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libmysofa-dev-1.3.2-1-x86_64.pkg.tar.zst               
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libogg-dev-1.3.5-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libopenmpt-dev-0.7.4-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libplacebo-dev-6.338.2-1-x86_64.pkg.tar.zst        
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libpng-dev-1.6.43-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libsdl2-dev-2.30.1-1-x86_64.pkg.tar.zst
