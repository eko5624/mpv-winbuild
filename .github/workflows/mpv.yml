          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libvpx-dev-1.12.0-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libwebp-dev-1.3.2-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libxml2-dev-2.12.5-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libxvid-dev-1.3.7-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libzimg-dev-3.0.5-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/libzvbi-dev-0.2.42-1-x86_64.pkg.tar.zst        
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/luajit2-dev-2.1_20231117-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/mujs-dev-1.3.4-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/openal-soft-dev-1.23.1-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/openssl-dev-3.2.1-1-x86_64.pkg.tar.zst      
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/opus-dev-1.5.1-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/rav1e-dev-0.7.1-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/rubberband-dev-3.3.0-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/shaderc-dev-2024.0-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/spirv-cross-dev-1.3.261.1-1-x86_64.pkg.tar.zst                
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/uavs3d-dev-1.1-1-x86_64.pkg.tar.zst        
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/vapoursynth-dev-66-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/vulkan-dev-1.3.275.0-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/xxhash-dev-0.8.2-1-x86_64.pkg.tar.zst
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev-gcc-mcf-$BIT/zlib-dev-2.1.6-1-x86_64.pkg.tar.zst
          pacman -U *.zst --noconfirm
          sudo chmod 777 -R ${{ env.top_dir }} .
          cd mpv; sudo -H -u builder makepkg-cross -sLf
      - name: Release mpv and libmpv  
        run: ./release-latest.sh mpv mpv

  package:
    needs: [mpv]
    runs-on: ubuntu-latest
    env:
      BIT: ${{ inputs.build_target }}
      GH_TOKEN: ${{ secrets.BOT }}
    container:
      image: docker://ghcr.io/eko5624/archlinux:latest
    steps:    
      - name: Checkout
        uses: actions/checkout@main
      - name: Setting top_dir env
        run: |
          echo "top_dir=$(cd ~ && pwd)" >> $GITHUB_ENV
      - name: Setup Packages      
        run: |
          curl -OL https://github.com/${{ github.repository }}/releases/download/latest-gcc-mcf/config-1.0-1-x86_64.pkg.tar.xz        
          curl -OL https://github.com/${{ github.repository }}/releases/download/latest-gcc-mcf/ffmpeg-git-6.1.1-1-x86_64.pkg.tar.xz
          curl -OL https://github.com/${{ github.repository }}/releases/download/latest-gcc-mcf/libmpv-git-0.37.0-1-x86_64.pkg.tar.xz
          curl -OL https://github.com/${{ github.repository }}/releases/download/latest-gcc-mcf/mpv-git-0.37.0-1-x86_64.pkg.tar.xz
          pacman -U *.xz --noconfirm
      - name: Get ffmpeg latest commit sha
        run: echo "ffmpeg_sha=$(cat ${{ env.top_dir }}/opt/ffmpeg/SHORT_SHA)" >> $GITHUB_ENV
      - name: Get current timestamp
        run: echo "date=$(date +%Y%m%d)" >> $GITHUB_ENV
      - name: Zip Packages    
        run: |
          curl -OL https://github.com/yt-dlp/yt-dlp/releases/download/2023.12.30/yt-dlp.exe
          mv yt-dlp.exe ${{ env.top_dir }}/opt/mpv
          7z a mpv-$BIT-gcc.7z ${{ env.top_dir }}/opt/mpv/*
          7z a libmpv-$BIT-gcc.7z ${{ env.top_dir }}/opt/libmpv/*
          7z a ffmpeg-$BIT-gcc-${{ env.ffmpeg_sha }}.7z ${{ env.top_dir }}/opt/ffmpeg/*
      - name: Release
        run: ./release-package.sh


