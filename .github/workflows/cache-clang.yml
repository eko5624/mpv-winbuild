name: cache-clang
defaults:
  run:
    shell: bash
on:
  workflow_dispatch:
  
jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux/archlinux:base-devel
    steps:    
      - name: Install Dependencies
        run: |
          pacman -Syu --noconfirm
          pacman -S --noconfirm --needed git unzip p7zip curl jq
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git config --global pull.rebase true
          git config --global rebase.autoStash true
          git config --global fetch.prune true
          git config --global --add safe.directory $PWD
      - name: Setting top_dir env
        run: |
           echo "top_dir=$(cd ~ && pwd)" >> $GITHUB_ENV
      - name: Loading clang cache
        uses: actions/cache/restore@main
        with:
          path: ${{ env.top_dir }}/cross
          key: clang-${{ github.run_id }}
          restore-keys: |
            clang-
            
      - name: Setup Clang Toolchain
        run: |
          cd ${{ env.top_dir }}
          if [[ ! -d "cross/bin" ]]; then
            curl -OL https://github.com/eko5624/toolchain/releases/download/toolchain/llvm-mingw-2023-12-28-ucrt-archlinux-x86_64.7z
            #curl -OL https://github.com/eko5624/toolchain/releases/download/toolchain/llvm-mingw-2023-11-21-ucrt-x86_64.7z
            #curl -OL https://github.com/mstorsjo/llvm-mingw/releases/download/20231128/llvm-mingw-20231128-ucrt-ubuntu-20.04-x86_64.tar.xz
            #tar -Jxf llvm-mingw-*.tar.xz
            #rm llvm-mingw-*.tar.xz
            #mv llvm-mingw* cross
            7z x llvm-mingw*.7z
            rm llvm-mingw*.7z
            #rm cross/x86_64-w64-mingw32/lib/*.dll.a
            #cp cross/x86_64-w64-mingw32/lib/libc++.a cross/x86_64-w64-mingw32/lib/libstdc++.a
          fi

      - name: Saving clang cache
        uses: actions/cache/save@main
        if: always()
        with:
          path: ${{ env.top_dir }}/cross
          key: clang-${{ github.run_id }}
