name: test
defaults:
  run:
    shell: bash
strategy:
  fail-fast: false
  matrix:
    arch: [x86_64, x86_64_v3]
on:
  workflow_dispatch:
    inputs:
      compiler:
        description: "Compiler"
        required: false
        default: "clang"
        type: choice
        options:
        - clang
        - gcc

  #schedule:
  #- cron: '30 0 * * MON'
    
jobs:
  amf:
    runs-on: ubuntu-latest
    env:
      COMPILER: ${{ inputs.compiler }}
      BIT: ${{matrix.arch}}
      GH_TOKEN: ${{ secrets.BOT }}
    container:
      image: docker://ghcr.io/eko5624/archlinux:latest
    steps:
      - name: Checkout
        uses: actions/checkout@main
      - name: Add builder user
        run: |
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
          install -m644 pacman-config/makepkg_cross_$COMPILER.conf /etc/
          install -m755 pacman-config/makepkg-cross-$COMPILER /usr/bin/
      - name: Setting top_dir env
        run: echo "top_dir=$(cd ~ && pwd)" >> $GITHUB_ENV
      - name: Loading ${{ inputs.compiler }}-${{matrix.arch}} cache
        uses: actions/cache@main
        with:
          path: ${{ env.top_dir }}/cross
          key: ${{ inputs.compiler }}-${{matrix.arch}}-ucrt
      - name: Build
        run: |
          sudo chmod 777 -R ${{ env.top_dir }} .
          cd amf-dev; sudo -H -u builder makepkg-cross-$COMPILER
      - name: Release
        run: ./release-dev.sh amf-headers-dev amf-dev
