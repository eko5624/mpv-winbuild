name: libssh
defaults:
  run:
    shell: bash
on:
  workflow_dispatch:

  #schedule:
  #- cron: '30 0 * * MON'
    
jobs:
  libssh:
    runs-on: ubuntu-latest
    container:
      image: docker://ghcr.io/eko5624/archlinux:latest
    steps: 
      - name: Add builder user
        run: |
          useradd builder -m
          echo "builder ALL=(ALL) NOPASSWD: ALL" >> /etc/sudoers
      - name: Setting top_dir env
        run: |
          echo "top_dir=$(cd ~ && pwd)" >> $GITHUB_ENV     
      - name: Checkout
        uses: actions/checkout@main
      - name: Setting makepkg etc
        run: |
          sudo cp pacman-config/makepkg_cross.conf /etc
          sudo cp pacman-config/makepkg-cross /usr/local/bin
      - name: Loading clang cache
        uses: actions/cache/restore@main
        with:
          path: ${{ env.top_dir }}/cross
          key: clang-${{ github.run_id }}
          restore-keys: |
            clang-
      - name: Build
        run: |
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev/zlib-dev-2.1.3-1-x86_64.pkg.tar.zst     
          curl -OL https://github.com/${{ github.repository }}/releases/download/dev/mbedtls-dev-3.4.1-1-x86_64.pkg.tar.zst
          pacman -U *.zst --noconfirm          
          sudo chmod 777 -R ${{ env.top_dir }}
          sudo chmod 777 -R .
          cd libssh-dev
          sudo -H -u builder makepkg-cross -sC --noconfirm
      - name: Release
        env:
          GH_TOKEN: ${{ secrets.BOT }}
        run: |
          ./release-dev.sh libssh-dev libssh-dev
